<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>החלטת ריבית רבעונית - BEZOT CAPITAL</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f9; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            position: relative;
        }
        
        /* עיצוב הלוגו מוטמע Base64 */
        .logo-container { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            transition: transform 0.3s ease-in-out; 
            z-index: 10;
        }
        .logo-container img { 
            height: 60px; /* גובה מותאם ללוגו המלא */
            width: auto; 
            display: block;
        }
        .logo-container:hover { transform: scale(1.05); }

        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 420px; 
            text-align: center; 
            border-top: 5px solid #002349;
            box-sizing: border-box;
        }

        h2 { color: #002349; margin: 0 0 5px 0; font-size: 1.4em; font-weight: 800; }
        .sub-header { color: #718096; margin-bottom: 5px; font-size: 0.9em; }

        .amount-box { 
            background: #002349; 
            padding: 12px; 
            border-radius: 10px; 
            margin: 10px 0; 
            font-size: 1.4em; 
            font-weight: bold; 
            color: #b39359; 
        }
        
        .intro-text { 
            color: #4a5a6a; 
            font-size: 0.85em; 
            line-height: 1.4; 
            margin-bottom: 15px; 
            background: #fdfaf3; 
            padding: 10px; 
            border-radius: 8px; 
            border-right: 4px solid #b39359; 
            text-align: right; 
        }

        .slider-container { margin: 15px 0 10px 0; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #002349; margin: 10px 0; }
        
        .quick-picks { display: flex; justify-content: space-between; margin-bottom: 15px; gap: 5px; }
        .quick-btn { 
            background: #fff; border: 1px solid #d1d9e0; padding: 8px; border-radius: 6px; 
            font-size: 0.85em; cursor: pointer; flex: 1; font-weight: 600; color: #002349; 
        }
        .quick-btn.active { background: #002349; color: #fff; border-color: #002349; }

        .stats { display: flex; justify-content: space-between; gap: 10px; margin-top: 15px; }
        .stats div { width: 50%; background: #f8f9fa; padding: 10px; border-radius: 10px; border: 1px solid #edf0f2; }
        .label { font-size: 0.75em; color: #718096; display: block; }
        .val { font-size: 1.1em; font-weight: 700; color: #002349; }
        
        #dynamic-summary {
            margin-top: 20px;
            font-weight: 700;
            color: #b39359; 
            font-size: 1.1em;
            min-height: 1.2em;
        }

        .btn { 
            color: white; border: none; padding: 15px; border-radius: 10px; 
            font-size: 1.1em; cursor: pointer; width: 100%; margin-top: 10px; 
            font-weight: bold; transition: all 0.2s; 
        }
        .btn.active { background: #b39359; color: #002349; }
        .btn.declined { background: #e53e3e; }

        @media (max-height: 650px) {
            .card { padding: 15px; }
            .intro-text { font-size: 0.8em; margin-bottom: 8px; padding: 8px; }
            #dynamic-summary { margin-top: 10px; }
            .btn { margin-top: 5px; padding: 12px; }
        }
    </style>
</head>
<body>

<a href="https://bezotcapital.com/" target="_blank" class="logo-container">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAKMAAABhCAMAAABfC5fUAAAAGXRFWHRTb2Z0d2FyZQBBZG9iZSBJbWFnZVJlYWR5ccllPAAAAAZQTFRF////AAAAVGl7uAAAAAJ0Uk5T/wDltzBKAAACZklEQVR42uyby3KDMAxFeS8vYCHv///iFpI0vS0z7YAtu9K5Z8YpY6GRLYm9uAIAAAAAAAAAAAAAAAAAAACA/0Zon9V9L6X9K8M0RNoq0pYI66/871L37yK6D/R9u6hfK7r7uIge9v7ZXYTfhX6O7iIuMv9Z6N9/l8fX9v6v9F8f48l4Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Z3jPQTI810Y6Yv8ZfI/Xv4ZAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD8O34CDAC3CmsmZlFshAAAAABJRU5ErkJggg==" alt="Bezot Capital">
</a>

<div class="card">
    <h2>שלום ישראל ישראלי,</h2>
    <div class="sub-header">סכום הריבית שנצבר לזכותך ברבעון זה:</div>
    <div class="amount-box">₪10,000</div>
    
    <div class="intro-text">
        ניתן לגלגל את סכום הרווח לסכום ההלוואה הכולל ובכך להגדיל את הרווח ברבעונים הבאים.
    </div>

    <div class="slider-container">
        <input type="range" id="rollover-slider" min="0" max="10000" value="10000" step="100" oninput="updateValues(this.value, true)">
    </div>

    <div class="quick-picks">
        <button class="quick-btn" onclick="setQuickPick(2500, this)">25%</button>
        <button class="quick-btn" onclick="setQuickPick(5000, this)">50%</button>
        <button class="quick-btn" onclick="setQuickPick(7500, this)">75%</button>
        <button class="quick-btn active" onclick="setQuickPick(10000, this)">100%</button>
    </div>

    <div class="stats">
        <div>
            <span class="label">גלגול להשקעה</span>
            <span class="val" id="rollover-val">₪10,000</span>
        </div>
        <div>
            <span class="label">משיכה לבנק</span>
            <span class="val" id="withdraw-val">₪0</span>
        </div>
    </div>

    <div id="dynamic-summary">גלגלו לי ₪10,000 מהסכום</div>
    <button id="submit-btn" class="btn active">אישור וחתימה דיגיטלית</button>
</div>

<script>
    const totalAmount = 10000;
    const slider = document.getElementById('rollover-slider');
    const submitBtn = document.getElementById('submit-btn');
    const dynamicSummary = document.getElementById('dynamic-summary');

    function setQuickPick(val, btn) {
        slider.value = val;
        document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateValues(val, false);
    }

    function updateValues(val, fromSlider) {
        const rollover = parseInt(val);
        const withdraw = totalAmount - rollover;
        
        document.getElementById('rollover-val').innerText = '₪' + rollover.toLocaleString();
        document.getElementById('withdraw-val').innerText = '₪' + withdraw.toLocaleString();
        
        if (rollover === 0) {
            dynamicSummary.innerText = ""; 
            submitBtn.innerText = "לא מעוניין בגלגול";
            if(submitBtn.classList.contains('active')) submitBtn.classList.replace('active', 'declined');
        } else {
            dynamicSummary.innerText = `גלגלו לי ₪${rollover.toLocaleString()} מהסכום`;
            submitBtn.innerText = "אישור וחתימה דיגיטלית";
            if(submitBtn.classList.contains('declined')) submitBtn.classList.replace('declined', 'active');
        }

        if (fromSlider) {
            document.querySelectorAll('.quick-btn').forEach(b => {
                const btnPct = parseInt(b.innerText);
                if ((btnPct / 100) * totalAmount == val) b.classList.add('active');
                else b.classList.remove('active');
            });
        }
    }
</script>

</body>
</html>
