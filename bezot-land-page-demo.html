<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>החלטת ריבית רבעונית - BEZOT CAPITAL</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f9; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            position: relative;
        }

        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 420px; 
            text-align: center; 
            border-top: 5px solid #002349;
            box-sizing: border-box;
        }

        h2 { color: #002349; margin: 0 0 5px 0; font-size: 1.5em; font-weight: 800; }
        .sub-header { color: #718096; margin-bottom: 5px; font-size: 0.95em; }

        .amount-box { 
            background: #002349; 
            padding: 15px; 
            border-radius: 12px; 
            margin: 15px 0; 
            font-size: 1.6em; 
            font-weight: bold; 
            color: #b39359; 
        }
        
        .intro-text { 
            color: #4a5a6a; 
            font-size: 0.9em; 
            line-height: 1.5; 
            margin-bottom: 20px; 
            background: #fdfaf3; 
            padding: 12px; 
            border-radius: 8px; 
            border-right: 4px solid #b39359; 
            text-align: right; 
        }

        .slider-container { margin: 20px 0 15px 0; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #002349; margin: 10px 0; }
        
        .quick-picks { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 8px; }
        .quick-btn { 
            background: #fff; border: 1px solid #d1d9e0; padding: 10px; border-radius: 8px; 
            font-size: 0.9em; cursor: pointer; flex: 1; font-weight: 600; color: #002349; 
            transition: all 0.2s;
        }
        .quick-btn.active { background: #002349; color: #fff; border-color: #002349; }

        .stats { display: flex; justify-content: space-between; gap: 12px; margin-top: 15px; }
        .stats div { width: 50%; background: #f8f9fa; padding: 12px; border-radius: 10px; border: 1px solid #edf0f2; }
        .label { font-size: 0.8em; color: #718096; display: block; margin-bottom: 4px; }
        .val { font-size: 1.15em; font-weight: 700; color: #002349; }
        
        #dynamic-summary {
            margin-top: 25px;
            font-weight: 700;
            color: #b39359; 
            font-size: 1.1em;
            min-height: 1.2em;
        }

        .btn { 
            color: white; border: none; padding: 16px; border-radius: 12px; 
            font-size: 1.15em; cursor: pointer; width: 100%; margin-top: 12px; 
            font-weight: bold; transition: all 0.2s; 
        }
        .btn.active { background: #b39359; color: #002349; }
        .btn.declined { background: #e53e3e; }

        @media (max-height: 650px) {
            .card { padding: 20px; }
            .intro-text { font-size: 0.85em; margin-bottom: 10px; padding: 10px; }
            #dynamic-summary { margin-top: 15px; }
            .btn { margin-top: 8px; padding: 14px; }
        }
    </style>
</head>
<body>

<div class="card">
    <h2>שלום ישראל ישראלי,</h2>
    <div class="sub-header">סכום הריבית שנצבר לזכותך ברבעון זה:</div>
    <div class="amount-box">₪10,000</div>
    
    <div class="intro-text">
        ניתן לגלגל את סכום הרווח לסכום ההלוואה הכולל ובכך להגדיל את הרווח ברבעונים הבאים.
    </div>

    <div class="slider-container">
        <input type="range" id="rollover-slider" min="0" max="10000" value="10000" step="100" oninput="updateValues(this.value, true)">
    </div>

    <div class="quick-picks">
        <button class="quick-btn" onclick="setQuickPick(2500, this)">25%</button>
        <button class="quick-btn" onclick="setQuickPick(5000, this)">50%</button>
        <button class="quick-btn" onclick="setQuickPick(7500, this)">75%</button>
        <button class="quick-btn active" onclick="setQuickPick(10000, this)">100%</button>
    </div>

    <div class="stats">
        <div>
            <span class="label">גלגול להשקעה</span>
            <span class="val" id="rollover-val">₪10,000</span>
        </div>
        <div>
            <span class="label">משיכה לבנק</span>
            <span class="val" id="withdraw-val">₪0</span>
        </div>
    </div>

    <div id="dynamic-summary">אני מסכים לגלגל ₪10,000 מהסכום</div>
    <button id="submit-btn" class="btn active">אישור וחתימה דיגיטלית</button>
</div>

<script>
    const totalAmount = 10000;
    const slider = document.getElementById('rollover-slider');
    const submitBtn = document.getElementById('submit-btn');
    const dynamicSummary = document.getElementById('dynamic-summary');

    function setQuickPick(val, btn) {
        slider.value = val;
        document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateValues(val, false);
    }

    function updateValues(val, fromSlider) {
        const rollover = parseInt(val);
        const withdraw = totalAmount - rollover;
        
        document.getElementById('rollover-val').innerText = '₪' + rollover.toLocaleString();
        document.getElementById('withdraw-val').innerText = '₪' + withdraw.toLocaleString();
        
        if (rollover === 0) {
            dynamicSummary.innerText = "אינני מעוניין בכך";
            submitBtn.innerText = "אישור וסיום";
            if(submitBtn.classList.contains('active')) submitBtn.classList.replace('active', 'declined');
        } else {
            dynamicSummary.innerText = `אני מסכים לגלגל ₪${rollover.toLocaleString()} מהסכום`;
            submitBtn.innerText = "אישור וחתימה דיגיטלית";
            if(submitBtn.classList.contains('declined')) submitBtn.classList.replace('declined', 'active');
        }

        if (fromSlider) {
            document.querySelectorAll('.quick-btn').forEach(b => {
                const btnPct = parseInt(b.innerText);
                if ((btnPct / 100) * totalAmount == val) b.classList.add('active');
                else b.classList.remove('active');
            });
        }
    }
</script>

</body>
</html>
