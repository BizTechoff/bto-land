<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CRM – מערכת כוח אדם</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f1e3d;--navy2:#1a2f52;--blue:#1d6af5;--blue2:#1350cc;
  --green:#059669;--red:#dc2626;--amber:#d97706;--teal:#0d9488;
  --bg:#eef1f7;--surface:#fff;--border:#e2e8f0;--text:#1a2332;--muted:#64748b;
  --r:10px;--sh:0 1px 4px rgba(0,0,0,.07);--sh2:0 6px 24px rgba(0,0,0,.14);
}
html,body{height:100%;font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);direction:rtl}
body{display:flex;overflow:hidden}

/* SIDEBAR */
#sb{width:232px;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;height:100vh;overflow-y:auto}
#sb::-webkit-scrollbar{width:3px}#sb::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1)}
.logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px}
.logo-ico{width:34px;height:34px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.logo h1{font-size:14.5px;font-weight:700;color:#fff;line-height:1.2}
.logo p{font-size:11px;color:rgba(255,255,255,.35);margin-top:1px}
.nsec{padding:9px 14px 3px;font-size:10px;font-weight:700;color:rgba(255,255,255,.22);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}
.sb nav a{display:flex;align-items:center;gap:8px;padding:8.5px 12px;color:rgba(255,255,255,.58);font-size:13px;font-weight:500;cursor:pointer;border-radius:7px;margin:1px 8px;transition:.13s;border:none;background:none;width:calc(100%-16px);text-align:right}
.sb nav a:hover{background:rgba(255,255,255,.07);color:#fff}
.sb nav a.on{background:var(--blue);color:#fff}
.sb nav a .ic{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.nb{background:rgba(255,255,255,.18);color:#fff;font-size:10.5px;padding:1px 6px;border-radius:9px;margin-right:auto;min-width:18px;text-align:center}
.on .nb{background:rgba(255,255,255,.3)}
.nb-r{background:rgba(220,38,38,.7)!important}
.sb-foot{padding:12px 14px;border-top:1px solid rgba(255,255,255,.06);margin-top:auto}
.sb-btn{width:100%;background:rgba(255,255,255,.07);border:none;color:rgba(255,255,255,.45);padding:6px 10px;border-radius:7px;font-size:11.5px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;margin-bottom:5px;transition:.13s}
.sb-btn:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.7)}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#tb{background:var(--surface);border-bottom:1px solid var(--border);padding:0 22px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:var(--sh)}
#tb-l{font-size:16px;font-weight:700;display:flex;align-items:center;gap:9px}
#tb-r{display:flex;gap:7px;align-items:center}
#pg{flex:1;overflow-y:auto;padding:20px 22px}
#pg::-webkit-scrollbar{width:5px}#pg::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

/* STATS */
.srow{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:13px;margin-bottom:20px}
.sc{background:var(--surface);border-radius:var(--r);padding:15px 16px;box-shadow:var(--sh);border-right:3px solid var(--blue);cursor:pointer;transition:.15s}
.sc:hover{transform:translateY(-1px);box-shadow:var(--sh2)}
.sc.g{border-color:var(--green)}.sc.r{border-color:var(--red)}.sc.a{border-color:var(--amber)}.sc.t{border-color:var(--teal)}
.sc .n{font-size:26px;font-weight:800;line-height:1}.sc .l{font-size:11.5px;color:var(--muted);margin-top:4px;font-weight:500}

/* CARDS */
.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--sh);padding:18px;margin-bottom:16px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ch h3{font-size:14.5px;font-weight:700}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* TABLES */
.tw{overflow-x:auto;border-radius:8px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:#f8fafc}
th{padding:8px 12px;font-weight:600;color:var(--muted);font-size:11.5px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f9fafb}
.lnk{color:var(--blue);cursor:pointer;font-weight:600}.lnk:hover{text-decoration:underline}
.mono{font-family:monospace;font-size:11.5px;color:var(--muted)}
.amt{font-weight:700;font-family:monospace;font-size:13px}

/* BADGES */
.bd{display:inline-flex;align-items:center;padding:2px 9px;border-radius:16px;font-size:11.5px;font-weight:600}
.bd.g{background:#dcfce7;color:#15803d}.bd.r{background:#fee2e2;color:#b91c1c}
.bd.a{background:#fef3c7;color:#b45309}.bd.b{background:#dbeafe;color:#1d4ed8}
.bd.t{background:#ccfbf1;color:#0f766e}.bd.gr{background:#f1f5f9;color:#475569}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.13s;font-family:inherit;white-space:nowrap}
.bp{background:var(--blue);color:#fff}.bp:hover{background:var(--blue2)}
.bg{background:var(--green);color:#fff}.bg:hover{background:#047857}
.br{background:var(--red);color:#fff}
.bo{background:#fff;color:var(--text);border:1px solid var(--border)}.bo:hover{background:#f8fafc}
.bgh{background:transparent;color:var(--muted);border:none;padding:5px 7px;border-radius:6px;cursor:pointer;font-size:15px;transition:.12s}.bgh:hover{background:#f1f5f9}
.bsm{padding:4px 10px;font-size:12px}
.bxs{padding:3px 7px;font-size:11.5px}

/* FORMS */
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:12px;font-weight:700;color:var(--text)}
.fg input,.fg select,.fg textarea{padding:7px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;color:var(--text);background:#fff;direction:rtl;width:100%;transition:.13s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,106,245,.1)}
.fg textarea{resize:vertical;min-height:68px}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.full{grid-column:1/-1}

/* MODAL */
#ov{position:fixed;inset:0;background:rgba(10,20,45,.55);z-index:500;display:none;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(3px)}
#ov.open{display:flex}
#md{background:#fff;border-radius:13px;box-shadow:var(--sh2);width:100%;max-width:660px;max-height:91vh;display:flex;flex-direction:column;animation:pop .17s ease}
@keyframes pop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.mh{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mh h3{font-size:15.5px;font-weight:700}
.mb{padding:20px;overflow-y:auto;flex:1}.mb::-webkit-scrollbar{width:4px}.mb::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
.mf{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:7px;flex-shrink:0}

/* TABS */
.tabs{display:flex;gap:1px;border-bottom:2px solid var(--border);margin-bottom:16px}
.tab{padding:7px 14px;background:none;border:none;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:inherit;transition:.12s;border-radius:6px 6px 0 0}
.tab.on{color:var(--blue);border-color:var(--blue);background:#eff6ff}

/* MISC */
.empty{text-align:center;padding:38px 16px;color:var(--muted)}
.empty .ei{font-size:38px;margin-bottom:8px}.empty p{font-size:13.5px}
#toasts{position:fixed;bottom:18px;left:18px;z-index:999;display:flex;flex-direction:column;gap:6px}
.toast{padding:10px 16px;border-radius:9px;color:#fff;font-size:13px;font-weight:600;animation:ts .2s ease;box-shadow:var(--sh2)}
.toast.ok{background:var(--green)}.toast.err{background:var(--red)}.toast.info{background:var(--blue)}
@keyframes ts{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
.pill{background:#eff6ff;color:var(--blue);border-radius:5px;padding:1px 7px;font-size:11px;font-weight:600;font-family:monospace}
.hl{background:#fffbeb!important}
.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:12px}
.ii label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:2px}
.ii .v{font-size:13.5px;font-weight:500}
.stl{font-size:12.5px;font-weight:700;color:var(--navy2);padding:12px 0 5px;display:flex;align-items:center;gap:6px}
.stl::after{content:'';flex:1;height:1px;background:var(--border)}
.ftree{font-family:'Courier New',monospace;font-size:12px;background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:14px 16px;line-height:2;color:#334155;overflow-x:auto;white-space:pre}
.ft-b{color:var(--blue);font-weight:700}
.flex{display:flex}.gap4{gap:4px}.gap8{gap:8px}
</style>
</head>
<body>

<nav id="sb" class="sb">
  <div class="logo">
    <div class="logo-ico">💼</div>
    <div><h1>CRM מערכת</h1><p>כוח אדם</p></div>
  </div>
  <nav>
    <div class="nsec">ראשי</div>
    <a onclick="go('dash')" id="n-dash" class="on"><span class="ic">📊</span> דשבורד</a>
    <div class="nsec">ניהול</div>
    <a onclick="go('clients')" id="n-clients"><span class="ic">👥</span> לקוחות <span class="nb" id="nb-c">0</span></a>
    <a onclick="go('suppliers')" id="n-suppliers"><span class="ic">🏭</span> ספקים <span class="nb" id="nb-s">0</span></a>
    <a onclick="go('corps')" id="n-corps"><span class="ic">🏢</span> תאגידים <span class="nb" id="nb-co">0</span></a>
    <div class="nsec">מסמכים</div>
    <a onclick="go('contracts')" id="n-contracts"><span class="ic">📋</span> חוזים</a>
    <a onclick="go('invoices')" id="n-invoices"><span class="ic">🧾</span> חשבוניות</a>
    <div class="nsec">שטח</div>
    <a onclick="go('visits')" id="n-visits"><span class="ic">📍</span> ביקורים</a>
    <a onclick="go('apts')" id="n-apts"><span class="ic">🏠</span> דירות</a>
    <a onclick="go('services')" id="n-services"><span class="ic">🔧</span> פניות שירות</a>
    <div class="nsec">כספים</div>
    <a onclick="go('collect')" id="n-collect"><span class="ic">💰</span> גבייה <span class="nb nb-r" id="nb-ov" style="display:none">0</span></a>
    <a onclick="go('payments')" id="n-payments"><span class="ic">🏛️</span> תשלומי מוסדות</a>
    <div class="nsec" style="margin-top:8px"></div>
    <a onclick="go('tree')" id="n-tree"><span class="ic">📁</span> מבנה תיקיות</a>
  </nav>
  <div class="sb-foot">
    <button class="sb-btn" onclick="exportData()">💾 גיבוי נתונים</button>
    <button class="sb-btn" onclick="importData()">📥 ייבוא נתונים</button>
  </div>
</nav>

<div id="main">
  <div id="tb">
    <div id="tb-l"><span id="tb-ic">📊</span><span id="tb-tx">דשבורד</span></div>
    <div id="tb-r"></div>
  </div>
  <div id="pg"></div>
</div>

<div id="ov" onclick="oc(event)">
  <div id="md">
    <div class="mh"><h3 id="mt"></h3><button class="bgh" onclick="CM()" style="font-size:17px">✕</button></div>
    <div class="mb" id="mb"></div>
    <div class="mf" id="mf"></div>
  </div>
</div>

<div id="toasts"></div>

<script>
// ── STORAGE ──────────────────────────────────────────
const K='crm3';
let D=function(){try{const r=localStorage.getItem(K);if(r)return JSON.parse(r);}catch(e){}
  return{clients:{},suppliers:{},corps:{},contracts:{},invoices:{},visits:{},apts:{},apt_visits:{},services:{},payments:{}};}();

function save(){try{localStorage.setItem(K,JSON.stringify(D));}catch(e){}updateBadges();}
function uid(p){return p+'-'+new Date().getFullYear()+'-'+Math.random().toString(36).slice(2,8).toUpperCase();}
function td(){return new Date().toISOString().split('T')[0];}
function fd(d){if(!d)return'—';return d.split('-').reverse().join('/');}
function fm(n){if(n===null||n===undefined||n==='')return'—';const x=parseFloat(n);if(isNaN(x))return'—';return'₪'+x.toLocaleString('he-IL');}
function daysDiff(d){if(!d)return null;return Math.floor((new Date()-new Date(d))/86400000);}

// ── TOAST ────────────────────────────────────────────
function T(msg,type='ok'){const e=document.createElement('div');e.className='toast '+type;e.textContent=msg;document.getElementById('toasts').appendChild(e);setTimeout(()=>e.remove(),3000);}

// ── MODAL ─────────────────────────────────────────────
function OM(title,body,foot=''){document.getElementById('mt').textContent=title;document.getElementById('mb').innerHTML=body;document.getElementById('mf').innerHTML=foot;document.getElementById('ov').classList.add('open');}
function CM(){document.getElementById('ov').classList.remove('open');}
function oc(e){if(e.target===document.getElementById('ov'))CM();}
function $v(id){const e=document.getElementById(id);return e?e.value.trim():'';}

// ── BADGES ────────────────────────────────────────────
function sb(s){const m={'active':'g','פעיל':'g','שולמה':'g','שולם':'g','סגורה':'gr','inactive':'gr','לא פעיל':'gr','הסתיים':'gr','פג תוקף':'gr','ממתינה':'a','ממתין':'a','בטיפול':'a','חלקית':'a','מוקפא':'a','בפיגור':'r','דחוף':'r','קריטי':'r','פתוחה':'b','רגיל':'gr','בינוני':'a'};const c=m[s]||'gr';const L={'active':'פעיל','inactive':'לא פעיל'};return`<span class="bd ${c}">${L[s]||s||'—'}</span>`;}

function updateBadges(){
  document.getElementById('nb-c').textContent=Object.keys(D.clients).length;
  document.getElementById('nb-s').textContent=Object.keys(D.suppliers).length;
  document.getElementById('nb-co').textContent=Object.keys(D.corps).length;
  const ov=Object.values(D.invoices).filter(i=>i.entity_type==='client'&&i.payment_status!=='שולמה'&&i.due_date&&i.due_date<td()).length;
  const el=document.getElementById('nb-ov');el.textContent=ov;el.style.display=ov?'':'none';
}

// ── NAV ────────────────────────────────────────────────
const PAGES={dash:['📊','דשבורד',rDash],clients:['👥','לקוחות',rClients],suppliers:['🏭','ספקים',rSuppliers],corps:['🏢','תאגידים',rCorps],contracts:['📋','חוזים',rContracts],invoices:['🧾','חשבוניות',rInvoices],visits:['📍','ביקורים',rVisits],apts:['🏠','דירות',rApts],services:['🔧','פניות שירות',rServices],collect:['💰','גבייה',rCollect],payments:['🏛️','תשלומי מוסדות',rPayments],tree:['📁','מבנה תיקיות',rTree]};
let PAGE='dash';
function go(p){PAGE=p;document.querySelectorAll('.sb nav a').forEach(a=>a.classList.remove('on'));const el=document.getElementById('n-'+p);if(el)el.classList.add('on');const[ic,tx,fn]=PAGES[p]||['','',()=>{}];document.getElementById('tb-ic').textContent=ic;document.getElementById('tb-tx').textContent=tx;document.getElementById('tb-r').innerHTML='';fn();}
function emptyR(cols,msg,ic='📭'){return`<tr><td colspan="${cols}"><div class="empty"><div class="ei">${ic}</div><p>${msg}</p></div></td></tr>`;}
function emptyE(ic,msg){return`<div class="empty"><div class="ei">${ic}</div><p>${msg}</p></div>`;}
function ii(l,v){return`<div class="ii"><label>${l}</label><div class="v">${v||'—'}</div></div>`;}

// ══════════════════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════════════════
function rDash(){
  const cls=Object.values(D.clients),sups=Object.values(D.suppliers),cors=Object.values(D.corps);
  const allI=Object.values(D.invoices),allS=Object.values(D.services),allC=Object.values(D.contracts);
  const cliI=allI.filter(i=>i.entity_type==='client');
  const openI=cliI.filter(i=>i.payment_status!=='שולמה');
  const ovI=openI.filter(i=>i.due_date&&i.due_date<td());
  const openS=allS.filter(s=>s.status==='פתוחה');
  const actC=allC.filter(c=>c.status==='פעיל');
  const totR=openI.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  const pendP=Object.values(D.payments).filter(p=>p.status==='ממתין');
  document.getElementById('pg').innerHTML=`
  <div class="srow">
    <div class="sc" onclick="go('clients')"><div class="n">${cls.length}</div><div class="l">👥 לקוחות</div></div>
    <div class="sc t" onclick="go('suppliers')"><div class="n">${sups.length}</div><div class="l">🏭 ספקים</div></div>
    <div class="sc" onclick="go('corps')"><div class="n">${cors.length}</div><div class="l">🏢 תאגידים</div></div>
    <div class="sc a" onclick="go('contracts')"><div class="n">${actC.length}</div><div class="l">📋 חוזים פעילים</div></div>
    <div class="sc r" onclick="go('collect')"><div class="n">${ovI.length}</div><div class="l">⚠️ בפיגור</div></div>
    <div class="sc a" onclick="go('invoices')"><div class="n">${openI.length}</div><div class="l">🧾 חשבוניות פתוחות</div></div>
    <div class="sc" onclick="go('services')"><div class="n">${openS.length}</div><div class="l">🔧 פניות פתוחות</div></div>
    <div class="sc g" onclick="go('collect')"><div class="n" style="font-size:18px">${fm(totR)}</div><div class="l">💰 לגבייה</div></div>
  </div>
  ${pendP.length?`<div class="card" style="border-right:3px solid var(--amber)">
    <div class="ch"><h3>⏰ תשלומי מוסדות ממתינים</h3><button class="btn bo bsm" onclick="go('payments')">הכל</button></div>
    <div class="tw"><table><thead><tr><th>מוסד</th><th>סכום</th><th>לפירעון</th></tr></thead><tbody>
    ${pendP.slice(0,3).map(p=>`<tr><td><b>${p.institution}</b></td><td class="amt">${fm(p.amount)}</td><td>${fd(p.due_date)}</td></tr>`).join('')}
    </tbody></table></div></div>`:''}
  <div class="g2">
    <div class="card"><div class="ch"><h3>🔧 פניות שירות אחרונות</h3><button class="btn bo bsm" onclick="go('services')">הכל</button></div>
    ${allS.length?`<div class="tw"><table><thead><tr><th>לקוח</th><th>נושא</th><th>סטטוס</th></tr></thead><tbody>
    ${allS.slice(-5).reverse().map(s=>`<tr><td>${s._cn||'—'}</td><td>${s.subject||'—'}</td><td>${sb(s.status)}</td></tr>`).join('')}
    </tbody></table></div>`:emptyE('📭','אין פניות')}</div>
    <div class="card"><div class="ch"><h3>🧾 חשבוניות אחרונות</h3><button class="btn bo bsm" onclick="go('invoices')">הכל</button></div>
    ${cliI.length?`<div class="tw"><table><thead><tr><th>לקוח</th><th>סכום</th><th>סטטוס</th></tr></thead><tbody>
    ${cliI.slice(-5).reverse().map(i=>`<tr><td>${i._en||'—'}</td><td class="amt">${fm(i.amount)}</td><td>${sb(i.payment_status)}</td></tr>`).join('')}
    </tbody></table></div>`:emptyE('📭','אין חשבוניות')}</div>
  </div>`;
}

// ══════════════════════════════════════════════════════
// CLIENTS
// ══════════════════════════════════════════════════════
function rClients(f=''){
  document.getElementById('tb-r').innerHTML=`
    <div style="position:relative"><input placeholder="חיפוש..." oninput="rClients(this.value)" value="${f}" style="padding:7px 32px 7px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;width:180px;direction:rtl"><span style="position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:13px">🔍</span></div>
    <button class="btn bp" onclick="eClient()">+ לקוח חדש</button>`;
  let list=Object.values(D.clients);

    `<button class="btn bo" onclick="eClient('${id}');CM()">✏️ עריכה</button><button class="btn bo" onclick="CM()">סגור</button>`);}

function ctab(t){document.querySelectorAll('#ct .tab').forEach(x=>x.classList.remove('on'));event.target.classList.add('on');['i','c','v','vi','s'].forEach(x=>{const e=document.getElementById('ct'+x);if(e)e.style.display=x===t?'':'none';});}

function conTbl(list){if(!list.length)return emptyE('📋','אין חוזים');

function invTbl(list){if(!list.length)return emptyE('🧾','אין חשבוניות');

function rInvoices(){document.getElementById('tb-r').innerHTML='';const all=Object.values(D.invoices);document.getElementById('pg').innerHTML=`<div class="card" style="padding:0"><div class="tw"><table><thead><tr><th>מ.ז</th><th>ישות</th><th>סוג</th><th>סכום</th><th>תאריך</th><th>לפירעון</th><th>סטטוס</th><th></th></tr></thead><tbody>${all.length?all.map(i=>{const e=D.clients[i.entity_id]||D.suppliers[i.entity_id]||{name:'—'};const ov=i.due_date&&i.due_date<td()&&i.payment_status!=='שולמה';return`<tr ${ov?'class="hl"':''}><td><span class="pill">${i.id}</span></td><td><b>${e.name}</b></td><td>${i.entity_type==='client'?'לקוח':'ספק'}</td><td class="amt">${fm(i.amount)}</td><td>${fd(i.date)}</td><td>${fd(i.due_date)}</td><td>${sb(i.payment_status||'ממתינה')}</td><td><button class="btn bo bxs" onclick="uInv('${i.id}')">עדכן</button></td></tr>`;}).join(''):emptyR(8,'אין חשבוניות','🧾')}</tbody></table></div></div>`;}

function eInv(et,eid){OM('חשבונית חדשה',`<div class="fgrid"><div class="fg"><label>סכום (₪) *</label><input id="iv-am" type="number"></div><div class="fg"><label>תאריך</label><input id="iv-dt" type="date" value="${td()}"></div><div class="fg"><label>לפירעון</label><input id="iv-du" type="date"></div><div class="fg"><label>מספר חשבונית</label><input id="iv-nm"></div><div class="fg"><label>סטטוס</label><select id="iv-st"><option>ממתינה</option><option>שולמה</option><option>בפיגור</option><option>חלקית</option></select></div><div class="fg full"><label>הערות</label><textarea id="iv-nt"></textarea></div></div>`,`<button class="btn bp" onclick="svInv('${et}','${eid}')">💾 שמור</button><button class="btn bo" onclick="CM()">ביטול</button>`);}

function svInv(et,eid){const am=$v('iv-am');if(!am){T('סכום חובה','err');return;}const id=uid('INV');const e=D.clients[eid]||D.suppliers[eid]||{name:'—'};D.invoices[id]={id,entity_type:et,entity_id:eid,_en:e.name,amount:am,date:$v('iv-dt'),due_date:$v('iv-du'),invoice_number:$v('iv-nm'),payment_status:$v('iv-st'),notes:$v('iv-nt'),created:td()};save();T('חשבונית נוספה ✓');CM();}

function uInv(id){const i=D.invoices[id];if(!i)return;OM('עדכון חשבונית',`<div class="fgrid"><div class="fg"><label>סטטוס</label><select id="is-st">${['ממתינה','שולמה','בפיגור','חלקית'].map(o=>`<option ${i.payment_status===o?'selected':''}>${o}</option>`).join('')}</select></div><div class="fg"><label>תאריך תשלום</label><input id="is-pd" type="date" value="${i.payment_date||''}"></div><div class="fg"><label>אסמכתא</label><input id="is-rf" value="${i.reference||''}"></div></div>`,`<button class="btn bp" onclick="svInvU('${id}')">עדכן</button><button class="btn bo" onclick="CM()">ביטול</button>`);}
function svInvU(id){D.invoices[id].payment_status=$v('is-st');D.invoices[id].payment_date=$v('is-pd')||undefined;D.invoices[id].reference=$v('is-rf')||undefined;D.invoices[id].updated=td();save();T('עודכן');CM();if(PAGE==='invoices')rInvoices();if(PAGE==='collect')rCollect();}

function rVisits(){document.getElementById('tb-r').innerHTML='';const all=Object.values(D.visits).sort((a,b)=>b.date>a.date?1:-1);document.getElementById('pg').innerHTML=`<div class="card" style="padding:0"><div class="tw"><table><thead><tr><th>תאריך</th><th>לקוח</th><th>מבקר</th><th>נושא</th><th>ממצאים</th><th>פעולות</th></tr></thead><tbody>${all.length?all.map(v=>{const e=D.clients[v.entity_id]||{name:'—'};return`<tr><td>${fd(v.date)}</td><td>${e.name}</td><td>${v.visitor||'—'}</td><td>${v.subject||'—'}</td><td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.findings||'—'}</td><td>${v.actions||'—'}</td></tr>`;}).join(''):emptyR(6,'אין ביקורים','📍')}</tbody></table></div></div>`;}

function eVis(et,eid){OM('ביקור חדש',`<div class="fgrid"><div class="fg"><label>תאריך</label><input id="vi-dt" type="date" value="${td()}"></div><div class="fg"><label>מבקר</label><input id="vi-vs"></div><div class="fg full"><label>נושא</label><input id="vi-sb"></div><div class="fg full"><label>ממצאים</label><textarea id="vi-fi"></textarea></div><div class="fg full"><label>פעולות נדרשות</label><textarea id="vi-ac"></textarea></div></div>`,`<button class="btn bp" onclick="svVis('${et}','${eid}')">💾 שמור</button><button class="btn bo" onclick="CM()">ביטול</button>`);}
function svVis(et,eid){const id=uid('VIS');D.visits[id]={id,entity_type:et,entity_id:eid,date:$v('vi-dt'),visitor:$v('vi-vs'),subject:$v('vi-sb'),findings:$v('vi-fi'),actions:$v('vi-ac'),created:td()};save();T('ביקור נוסף ✓');CM();if(PAGE==='visits')rVisits();}

function rApts(){
  document.getElementById('tb-r').innerHTML=`<button class="btn bp" onclick="eApt()">+ דירה חדשה</button>`;
  const list=Object.values(D.apts);
  document.getElementById('pg').innerHTML=`<div class="card" style="padding:0"><div class="tw"><table><thead><tr><th>כתובת</th><th>עיר</th><th>קומה</th><th>בעלים</th><th>טלפון</th><th>הערות</th><th></th></tr></thead><tbody>${list.length?list.map(a=>`<tr><td><span class="lnk" onclick="aptD('${a.id}')">${a.address}</span></td><td>${a.city||'—'}</td><td>${a.floor||'—'}</td><td>${a.owner||'—'}</td><td dir="ltr">${a.owner_phone||'—'}</td><td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.notes||'—'}</td><td class="flex gap4"><button class="bgh" onclick="aptD('${a.id}')">👁</button><button class="bgh" onclick="eApt('${a.id}')">✏️</button><button class="bgh" onclick="dApt('${a.id}')" style="color:var(--red)">🗑</button></td></tr>`).join(''):emptyR(7,'אין דירות','🏠')}</tbody></table></div></div>`;}

function eApt(id=null){const a=id?D.apts[id]||{}:{};OM(id?'עריכת דירה':'דירה חדשה',`<div class="fgrid"><div class="fg full"><label>כתובת מלאה *</label><input id="ap-ad" value="${a.address||''}"></div><div class="fg"><label>עיר</label><input id="ap-ci" value="${a.city||''}"></div><div class="fg"><label>קומה</label><input id="ap-fl" value="${a.floor||''}"></div><div class="fg"><label>מ"ר</label><input id="ap-sq" type="number" value="${a.sqm||''}"></div><div class="fg"><label>שם בעלים</label><input id="ap-ow" value="${a.owner||''}"></div><div class="fg"><label>טלפון בעלים</label><input id="ap-op" value="${a.owner_phone||''}" dir="ltr"></div><div class="fg full"><label>הערות</label><textarea id="ap-nt">${a.notes||''}</textarea></div></div>`,`<button class="btn bp" onclick="svApt('${id||''}')">💾 שמור</button><button class="btn bo" onclick="CM()">ביטול</button>`);}
function svApt(id){const address=$v('ap-ad');if(!address){T('כתובת חובה','err');return;}const isN=!id,eid=id||uid('APT');D.apts[eid]={id:eid,address,city:$v('ap-ci'),floor:$v('ap-fl'),sqm:$v('ap-sq'),owner:$v('ap-ow'),owner_phone:$v('ap-op'),notes:$v('ap-nt'),created:isN?td():(D.apts[id]?.created||td()),updated:td()};save();T(isN?'דירה נוספה ✓':'דירה עודכנה ✓');CM();if(PAGE==='apts')rApts();}
function dApt(id){if(!confirm('למחוק?'))return;delete D.apts[id];Object.keys(D.apt_visits).forEach(k=>{if(D.apt_visits[k].apt_id===id)delete D.apt_visits[k];});save();T('נמחק','info');rApts();}

function aptD(id){const a=D.apts[id];if(!a)return;const vis=Object.values(D.apt_visits).filter(v=>v.apt_id===id).sort((x,y)=>y.date>x.date?1:-1);OM(a.address,`<div class="ig">${ii('כתובת',a.address)}${ii('עיר',a.city)}${ii('קומה',a.floor)}${ii('מ"ר',a.sqm)}${ii('בעלים',a.owner)}${ii('טלפון',a.owner_phone)}</div><div class="stl">📍 ביקורים</div><button class="btn bp bsm" style="margin-bottom:10px" onclick="eAptV('${id}')">+ ביקור חדש</button>${vis.length?`<div class="tw"><table><thead><tr><th>תאריך</th><th>מבקר</th><th>ממצאים</th><th>דחיפות</th></tr></thead><tbody>${vis.map(v=>`<tr><td>${fd(v.date)}</td><td>${v.visitor||'—'}</td><td>${v.findings||'—'}</td><td>${sb(v.urgency||'רגיל')}</td></tr>`).join('')}</tbody></table></div>`:emptyE('📍','אין ביקורים')}`,`<button class="btn bo" onclick="eApt('${id}');CM()">✏️ עריכה</button><button class="btn bo" onclick="CM()">סגור</button>`);}

function eAptV(aptId){OM('ביקור בדירה',`<div class="fgrid"><div class="fg"><label>תאריך</label><input id="av-dt" type="date" value="${td()}"></div><div class="fg"><label>מבקר</label><input id="av-vs"></div><div class="fg"><label>דחיפות</label><select id="av-ur"><option>רגיל</option><option>בינוני</option><option>דחוף</option><option>קריטי</option></select></div><div class="fg full"><label>ממצאים</label><textarea id="av-fi"></textarea></div><div class="fg full"><label>פעולות נדרשות</label><textarea id="av-ac"></textarea></div></div>`,`<button class="btn bp" onclick="svAptV('${aptId}')">💾 שמור</button><button class="btn bo" onclick="CM()">ביטול</button>`);}
function svAptV(aptId){const id=uid('AV');D.apt_visits[id]={id,apt_id:aptId,date:$v('av-dt'),visitor:$v('av-vs'),urgency:$v('av-ur'),findings:$v('av-fi'),actions:$v('av-ac'),created:td()};save();T('ביקור נוסף ✓');CM();}

function srvTbl(list){if(!list.length)return emptyE('🔧','אין פניות');return`<div class="tw"><table><thead><tr><th>מ.ז</th><th>נושא</th><th>עדיפות</th><th>סטטוס</th><th>נפתח</th><th></th></tr></thead><tbody>${list.map(s=>`<tr><td><span class="pill">${s.id}</span></td><td>${s.subject||'—'}</td><td>${sb(s.priority||'רגיל')}</td><td>${sb(s.status)}</td><td>${fd(s.created)}</td><td><button class="btn bo bxs" onclick="uSrv('${s.id}')">עדכן</button></td></tr>`).join('')}</tbody></table></div>`;}

function rServices(){document.getElementById('tb-r').innerHTML='';const all=Object.values(D.services).sort((a,b)=>b.created>a.created?1:-1);document.getElementById('pg').innerHTML=`<div class="card" style="padding:0"><div class="tw"><table><thead><tr><th>מ.ז</th><th>לקוח</th><th>נושא</th><th>עדיפות</th><th>סטטוס</th><th>נפתח</th><th></th></tr></thead><tbody>${all.length?all.map(s=>`<tr><td><span class="pill">${s.id}</span></td><td>${s._cn||'—'}</td><td>${s.subject||'—'}</td><td>${sb(s.priority||'רגיל')}</td><td>${sb(s.status)}</td><td>${fd(s.created)}</td><td><button class="btn bo bxs" onclick="uSrv('${s.id}')">עדכן</button></td></tr>`).join(''):emptyR(7,'אין פניות שירות','🔧')}</tbody></table></div></div>`;}

function eSrv(cid){OM('פנייה חדשה',`<div class="fgrid"><div class="fg full"><label>נושא *</label><input id="sr-sb"></div><div class="fg"><label>עדיפות</label><select id="sr-pr"><option>רגיל</option><option>בינוני</option><option>דחוף</option><option>קריטי</option></select></div><div class="fg"><label>סטטוס</label><select id="sr-st"><option>פתוחה</option><option>בטיפול</option><option>סגורה</option></select></div><div class="fg full"><label>תיאור</label><textarea id="sr-ds"></textarea></div></div>`,`<button class="btn bp" onclick="svSrv('${cid}')">💾 שמור</button><button class="btn bo" onclick="CM()">ביטול</button>`);}
function svSrv(cid){const sub=$v('sr-sb');if(!sub){T('נושא חובה','err');return;}const id=uid('SRV');const c=D.clients[cid]||{name:'—'};D.services[id]={id,client_id:cid,_cn:c.name,subject:sub,priority:$v('sr-pr'),status:$v('sr-st'),description:$v('sr-ds'),created:td()};save();T('פנייה נוספה ✓');CM();if(PAGE==='services')rServices();}
function uSrv(id){const s=D.services[id];if(!s)return;OM('עדכון פנייה',`<div class="fgrid"><div class="fg"><label>סטטוס</label><select id="us-st">${['פתוחה','בטיפול','סגורה'].map(o=>`<option ${s.status===o?'selected':''}>${o}</option>`).join('')}</select></div><div class="fg full"><label>הערות עדכון</label><textarea id="us-nt">${s.update_notes||''}</textarea></div></div>`,`<button class="btn bp" onclick="svSrvU('${id}')">עדכן</button><button class="btn bo" onclick="CM()">ביטול</button>`);}
function svSrvU(id){D.services[id].status=$v('us-st');D.services[id].update_notes=$v('us-nt');D.services[id].updated=td();save();T('עודכן');CM();if(PAGE==='services')rServices();}

function rCollect(){
  document.getElementById('tb-r').innerHTML='';
  const all=Object.values(D.invoices).filter(i=>i.entity_type==='client');
  const open=all.filter(i=>i.payment_status!=='שולמה');
  const ov=open.filter(i=>i.due_date&&i.due_date<td());
  const totO=open.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  const totOv=ov.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  document.getElementById('pg').innerHTML=`
  <div class="srow">
    <div class="sc a"><div class="n">${open.length}</div><div class="l">🧾 פתוחות</div></div>
    <div class="sc r"><div class="n">${ov.length}</div><div class="l">⚠️ בפיגור</div></div>
    <div class="sc g"><div class="n" style="font-size:18px">${fm(totO)}</div><div class="l">💰 לגבייה</div></div>
    <div class="sc r"><div class="n" style="font-size:18px">${fm(totOv)}</div><div class="l">🔴 בפיגור סה"כ</div></div>
  </div>
  ${ov.length?`<div class="card" style="border-right:3px solid var(--red)">
    <div class="ch"><h3 style="color:var(--red)">⚠️ חשבוניות בפיגור</h3></div>
    <div class="tw"><table><thead><tr><th>לקוח</th><th>סכום</th><th>לפירעון</th><th>ימי פיגור</th><th>סטטוס</th><th></th></tr></thead><tbody>
    ${ov.sort((a,b)=>a.due_date>b.due_date?1:-1).map(i=>{const c=D.clients[i.entity_id]||{name:'—'};const days=daysDiff(i.due_date);return`<tr style="background:#fff5f5"><td><b>${c.name}</b></td><td class="amt">${fm(i.amount)}</td><td>${fd(i.due_date)}</td><td style="color:var(--red);font-weight:700">${days} ימים</td><td>${sb(i.payment_status)}</td><td class="flex gap4"><button class="btn bg bxs" onclick="mPaid('${i.id}')">✓ שולם</button><button class="btn bo bxs" onclick="uInv('${i.id}')">עדכן</button></td></tr>`;}).join('')}
    </tbody></table></div></div>`:''}
  <div class="card"><div class="ch"><h3>כל החשבוניות הפתוחות</h3></div>
  ${open.length?`<div class="tw"><table><thead><tr><th>לקוח</th><th>סכום</th><th>תאריך</th><th>לפירעון</th><th>סטטוס</th><th></th></tr></thead><tbody>
  ${open.sort((a,b)=>a.due_date>b.due_date?1:-1).map(i=>{const c=D.clients[i.entity_id]||{name:'—'};return`<tr><td>${c.name}</td><td class="amt">${fm(i.amount)}</td><td>${fd(i.date)}</td><td>${fd(i.due_date)}</td><td>${sb(i.payment_status)}</td><td class="flex gap4"><button class="btn bg bxs" onclick="mPaid('${i.id}')">✓ שולם</button><button class="btn bo bxs" onclick="uInv('${i.id}')">עדכן</button></td></tr>`;}).join('')}
  </tbody></table></div>`:emptyE('✅','כל החשבוניות שולמו')}</div>`;}

function mPaid(id){D.invoices[id].payment_status='שולמה';D.invoices[id].payment_date=td();D.invoices[id].updated=td();save();T('חשבונית סומנה כשולמה ✓');rCollect();}

function rPayments(){
  document.getElementById('tb-r').innerHTML=`<button class="btn bp" onclick="ePay()">+ תשלום חדש</button>`;
  const list=Object.values(D.payments).sort((a,b)=>b.date>a.date?1:-1);
  const pend=list.filter(p=>p.status==='ממתין');
  const totP=pend.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  document.getElementById('pg').innerHTML=`
  ${pend.length?`<div class="srow"><div class="sc a"><div class="n">${pend.length}</div><div class="l">⏰ ממתינים</div></div><div class="sc a"><div class="n" style="font-size:18px">${fm(totP)}</div><div class="l">💸 לתשלום</div></div></div>`:''}
  <div class="card" style="padding:0"><div class="tw"><table><thead><tr><th>מוסד</th><th>סכום</th><th>תאריך</th><th>לפירעון</th><th>סטטוס</th><th>אסמכתא</th><th></th></tr></thead><tbody>
  ${list.length?list.map(p=>`<tr ${p.status==='ממתין'&&p.due_date&&p.due_date<td()?'class="hl"':''}><td><b>${p.institution||'—'}</b></td><td class="amt">${fm(p.amount)}</td><td>${fd(p.date)}</td><td>${fd(p.due_date)}</td><td>${sb(p.status||'ממתין')}</td><td class="mono">${p.reference||'—'}</td><td class="flex gap4">${p.status==='ממתין'?`<button class="btn bg bxs" onclick="mPayD('${p.id}')">✓ שולם</button>`:''}<button class="bgh" onclick="dPay('${p.id}')" style="color:var(--red)">🗑</button></td></tr>`).join(''):emptyR(7,'אין תשלומים','🏛️')}
  </tbody></table></div></div>`;}

function ePay(){OM('תשלום למוסד',`<div class="fgrid"><div class="fg"><label>מוסד *</label><select id="py-in">${['ביטוח לאומי','מס הכנסה','מע"מ','פנסיה','קופ"ג','ביטוח בריאות','אחר'].map(o=>`<option>${o}</option>`).join('')}</select></div><div class="fg"><label>סכום (₪) *</label><input id="py-am" type="number"></div><div class="fg"><label>תאריך</label><input id="py-dt" type="date" value="${td()}"></div><div class="fg"><label>לפירעון</label><input id="py-du" type="date"></div><div class="fg"><label>אסמכתא</label><input id="py-rf"></div><div class="fg"><label>סטטוס</label><select id="py-st"><option>ממתין</option><option>שולם</option></select></div><div class="fg full"><label>הערות</label><textarea id="py-nt"></textarea></div></div>`,`<button class="btn bp" onclick="svPay()">💾 שמור</button><button class="btn bo" onclick="CM()">ביטול</button>`);}
function svPay(){const am=$v('py-am');if(!am){T('סכום חובה','err');return;}const id=uid('PAY');D.payments[id]={id,institution:$v('py-in'),amount:am,date:$v('py-dt'),due_date:$v('py-du'),reference:$v('py-rf'),status:$v('py-st'),notes:$v('py-nt'),created:td()};save();T('תשלום נוסף ✓');CM();rPayments();}
function mPayD(id){D.payments[id].status='שולם';D.payments[id].payment_date=td();D.payments[id].updated=td();save();T('תשלום עודכן ✓');rPayments();}
function dPay(id){if(!confirm('למחוק?'))return;delete D.payments[id];save();T('נמחק','info');rPayments();}

// ══════════════════════════════════════════════════════
// FOLDER TREE
// ══════════════════════════════════════════════════════
function rTree(){
  document.getElementById('tb-r').innerHTML='';
  const cls=Object.values(D.clients),sups=Object.values(D.suppliers),aps=Object.values(D.apts);
  function ct(c){const co=Object.values(D.contracts).filter(x=>x.entity_id===c.id).length;const iv=Object.values(D.invoices).filter(x=>x.entity_id===c.id).length;const vi=Object.values(D.visits).filter(x=>x.entity_id===c.id).length;const sr=Object.values(D.services).filter(x=>x.client_id===c.id).length;return`   ├── 📁 <span class="ft-b">${c.name}/</span>\n   │    ├── 📄 metadata.json\n   │    ├── 📁 חוזים/ (${co})\n   │    ├── 📁 חשבוניות/ (${iv})\n   │    ├── 📁 ביקורים/ (${vi})\n   │    └── 📁 פניות_ושירות/ (${sr})`;}
  document.getElementById('pg').innerHTML=`
  <div class="card"><div class="ch"><h3>📁 מבנה תיקיות – ייצוג ויזואלי</h3></div>
  <div class="ftree">
<b>📁 CRM_DATA/</b>
├── 📁 <span class="ft-b">לקוחות/</span> (${cls.length})
${cls.length?cls.map(c=>ct(c)).join('\n'):'│    └── (ריק)'}
├── 📁 <span class="ft-b">ספקים/</span> (${sups.length})
${sups.length?sups.map(s=>`   ├── 📁 <span class="ft-b">${s.name}/</span>\n   │    ├── 📄 metadata.json\n   │    ├── 📁 חוזים/\n   │    └── 📁 חשבוניות/`).join('\n'):'│    └── (ריק)'}
├── 📁 <span class="ft-b">תאגידים/</span> (${Object.keys(D.corps).length})
├── 📁 <span class="ft-b">דירות/</span> (${aps.length})
${aps.length?aps.map(a=>`   ├── 📁 <span class="ft-b">${a.address}/</span>\n   │    ├── 📄 metadata.json\n   │    └── 📁 ביקורים/`).join('\n'):'│    └── (ריק)'}
└── 📁 <span class="ft-b">_מערכת/</span>
     ├── 📄 index.json
     └── 📁 תשלומי_מוסדות/ (${Object.keys(D.payments).length})
  </div></div>
  ${cls.length?`<div class="card"><div class="ch"><h3>📄 דוגמה – metadata.json</h3></div>
  <div class="ftree">${JSON.stringify({id:cls[0].id,type:'client',name:cls[0].name,contact:cls[0].contact||'...',phone:cls[0].phone||'...',tariff:cls[0].tariff||'...',payment_terms:cls[0].payment_terms||'...',status:cls[0].status||'active',created:cls[0].created||td(),last_updated:td()},null,2)}</div></div>`:''}
  `;}

// ══════════════════════════════════════════════════════
// EXPORT / IMPORT
// ══════════════════════════════════════════════════════
function exportData(){const blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`crm_backup_${td()}.json`;a.click();T('גיבוי הורד ✓');}
function importData(){const input=document.createElement('input');input.type='file';input.accept='.json';input.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(!data.clients)throw new Error();Object.assign(D,data);save();T('נתונים יובאו ✓');go(PAGE);}catch(e){T('שגיאה בקובץ','err');}};r.readAsText(f);};input.click();}

// ── INIT ─────────────────────────────────────────────
updateBadges();go('dash');
</script>
