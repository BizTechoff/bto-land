<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הברכה בעסק — תמונה</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5ecd9;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 30px 15px;
  }
  .frame {
    max-width: 900px;
    width: 100%;
    background: #fbf3df;
    border-radius: 6px;
    box-shadow: 0 30px 80px -20px rgba(43, 29, 16, 0.25), 0 0 0 1px rgba(184, 138, 44, 0.2);
    padding: 14px;
    position: relative;
  }
  .frame::before {
    content: "";
    position: absolute; inset: 6px;
    border: 1.5px solid rgba(184, 138, 44, 0.4);
    pointer-events: none;
    border-radius: 4px;
  }
  svg { display: block; width: 100%; height: auto; border-radius: 4px; }
  @media print {
    body { padding: 0; background: white; }
    .frame { box-shadow: none; max-width: 100%; }
  }
</style>
</head>
<body>
  <div class="frame">
    <svg viewBox="0 0 900 1100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="הברכה בעסק - איור">
      <defs>
        <!-- Sky gradient -->
        <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#fef0c8"/>
          <stop offset="40%" stop-color="#fadc94"/>
          <stop offset="70%" stop-color="#f0c870"/>
          <stop offset="100%" stop-color="#e8b85a"/>
        </linearGradient>
        <!-- Ground gradient -->
        <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#c5a76a"/>
          <stop offset="100%" stop-color="#9c7e4a"/>
        </linearGradient>
        <!-- Sun radial -->
        <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#fff7d4"/>
          <stop offset="40%" stop-color="#f5d678"/>
          <stop offset="80%" stop-color="#e8b942"/>
          <stop offset="100%" stop-color="#d4982b"/>
        </radialGradient>
        <!-- Sun halo -->
        <radialGradient id="sunHalo" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#fff7d4" stop-opacity="0.85"/>
          <stop offset="40%" stop-color="#fff0a8" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#fff0a8" stop-opacity="0"/>
        </radialGradient>
        <!-- Vessel gradient (golden chalice) -->
        <linearGradient id="vesselGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#f5d678"/>
          <stop offset="40%" stop-color="#d9a943"/>
          <stop offset="100%" stop-color="#8a6620"/>
        </linearGradient>
        <linearGradient id="vesselShine" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#fff7d4" stop-opacity="0"/>
          <stop offset="50%" stop-color="#fff7d4" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#fff7d4" stop-opacity="0"/>
        </linearGradient>
        <!-- Blessing beam -->
        <linearGradient id="beamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#fff7d4" stop-opacity="0.85"/>
          <stop offset="60%" stop-color="#f5d678" stop-opacity="0.45"/>
          <stop offset="100%" stop-color="#e8b942" stop-opacity="0"/>
        </linearGradient>
        <!-- Heart gradient -->
        <radialGradient id="heartGrad" cx="50%" cy="40%" r="60%">
          <stop offset="0%" stop-color="#f5b5a0"/>
          <stop offset="60%" stop-color="#e87560"/>
          <stop offset="100%" stop-color="#b8472e"/>
        </radialGradient>
        <!-- Broken vessel (faded) -->
        <linearGradient id="brokenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#888173" stop-opacity="0.55"/>
          <stop offset="100%" stop-color="#5a5246" stop-opacity="0.55"/>
        </linearGradient>
      </defs>

      <!-- ========================================== -->
      <!-- BACKGROUND - golden sky                    -->
      <!-- ========================================== -->
      <rect width="900" height="1100" fill="url(#skyGrad)"/>

      <!-- Distant soft hills -->
      <path d="M 0 750 Q 200 700, 400 730 T 800 720 T 900 725 L 900 1100 L 0 1100 Z"
            fill="#c2a16a" opacity="0.4"/>
      <path d="M 0 790 Q 250 760, 500 780 T 900 775 L 900 1100 L 0 1100 Z"
            fill="#b59159" opacity="0.6"/>

      <!-- Ground -->
      <rect x="0" y="830" width="900" height="270" fill="url(#groundGrad)"/>

      <!-- Soft grass -->
      <g stroke="#7a6840" stroke-width="2" stroke-linecap="round" opacity="0.4">
        <path d="M 100 840 Q 102 830, 105 840"/>
        <path d="M 180 842 Q 182 832, 185 842"/>
        <path d="M 280 838 Q 282 828, 285 838"/>
        <path d="M 620 842 Q 622 832, 625 842"/>
        <path d="M 720 840 Q 722 830, 725 840"/>
        <path d="M 800 842 Q 802 832, 805 842"/>
      </g>

      <!-- ========================================== -->
      <!-- TOP - Sun with smiling face                -->
      <!-- ========================================== -->
      <!-- Sun halo (large) -->
      <circle cx="450" cy="130" r="220" fill="url(#sunHalo)" opacity="0.75"/>

      <!-- Sun rays -->
      <g stroke="#fff7d4" stroke-width="3" stroke-linecap="round" opacity="0.7">
        <line x1="450" y1="30" x2="450" y2="60"/>
        <line x1="550" y1="130" x2="525" y2="130"/>
        <line x1="450" y1="230" x2="450" y2="200"/>
        <line x1="350" y1="130" x2="375" y2="130"/>
        <line x1="380" y1="60" x2="395" y2="80"/>
        <line x1="520" y1="60" x2="505" y2="80"/>
        <line x1="380" y1="200" x2="395" y2="180"/>
        <line x1="520" y1="200" x2="505" y2="180"/>
        <!-- diagonal rays -->
        <line x1="320" y1="80" x2="340" y2="100"/>
        <line x1="580" y1="80" x2="560" y2="100"/>
        <line x1="320" y1="180" x2="340" y2="160"/>
        <line x1="580" y1="180" x2="560" y2="160"/>
      </g>

      <!-- The Sun itself -->
      <circle cx="450" cy="130" r="75" fill="url(#sunGrad)"/>
      <circle cx="450" cy="130" r="55" fill="#f5c84a"/>

      <!-- Sun face — smiling -->
      <circle cx="430" cy="118" r="4" fill="#8a5e1e"/>
      <circle cx="470" cy="118" r="4" fill="#8a5e1e"/>
      <!-- Eye twinkles -->
      <circle cx="431" cy="116" r="1.2" fill="#fff7d4"/>
      <circle cx="471" cy="116" r="1.2" fill="#fff7d4"/>
      <!-- Big smile -->
      <path d="M 422 145 Q 450 167 478 145" stroke="#8a5e1e" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <!-- Cheeks -->
      <circle cx="416" cy="140" r="6" fill="#f5a880" opacity="0.55"/>
      <circle cx="484" cy="140" r="6" fill="#f5a880" opacity="0.55"/>

      <!-- ========================================== -->
      <!-- BLESSING BEAMS FROM SKY                    -->
      <!-- ========================================== -->
      <!-- Main central beam -->
      <path d="M 420 200 L 380 540 L 520 540 L 480 200 Z" fill="url(#beamGrad)" opacity="0.7"/>
      <!-- Side beams -->
      <path d="M 380 215 L 320 530 L 360 530 L 410 215 Z" fill="url(#beamGrad)" opacity="0.45"/>
      <path d="M 520 215 L 540 530 L 580 530 L 490 215 Z" fill="url(#beamGrad)" opacity="0.45"/>

      <!-- Golden particles falling (raindrops of blessing) -->
      <g fill="#f5d678">
        <circle cx="425" cy="280" r="4" opacity="0.85"/>
        <circle cx="460" cy="320" r="3.5" opacity="0.8"/>
        <circle cx="390" cy="350" r="4" opacity="0.85"/>
        <circle cx="500" cy="380" r="3.5" opacity="0.8"/>
        <circle cx="440" cy="410" r="4" opacity="0.85"/>
        <circle cx="410" cy="440" r="3" opacity="0.75"/>
        <circle cx="475" cy="450" r="4" opacity="0.85"/>
        <circle cx="450" cy="490" r="4.5" opacity="0.9"/>
        <circle cx="420" cy="510" r="3.5" opacity="0.8"/>
        <circle cx="480" cy="520" r="3.5" opacity="0.8"/>
        <!-- Star sparkles -->
        <path d="M 380 270 L 383 277 L 390 280 L 383 283 L 380 290 L 377 283 L 370 280 L 377 277 Z" opacity="0.9"/>
        <path d="M 510 290 L 513 297 L 520 300 L 513 303 L 510 310 L 507 303 L 500 300 L 507 297 Z" opacity="0.85"/>
        <path d="M 395 470 L 398 477 L 405 480 L 398 483 L 395 490 L 392 483 L 385 480 L 392 477 Z" opacity="0.85"/>
        <path d="M 495 480 L 498 487 L 505 490 L 498 493 L 495 500 L 492 493 L 485 490 L 492 487 Z" opacity="0.85"/>
      </g>

      <!-- Doves flying down -->
      <g fill="#fff5dc">
        <!-- Dove 1 -->
        <g transform="translate(240, 250)">
          <ellipse cx="0" cy="0" rx="20" ry="10" fill="#fff5dc"/>
          <path d="M -22 -5 Q -18 -15, -10 -10 Q -6 -16, 0 -8 Z" fill="#fff5dc"/>
          <path d="M 5 -8 Q 12 -16, 20 -10 Q 25 -15, 22 -3 Z" fill="#fff5dc"/>
          <circle cx="-22" cy="-2" r="5" fill="#fff5dc"/>
          <circle cx="-24" cy="-3" r="1" fill="#3a2818"/>
          <path d="M -28 -1 L -32 0 L -28 1" stroke="#e8b942" stroke-width="1.5" fill="none"/>
          <!-- Olive branch in beak -->
          <line x1="-32" y1="0" x2="-42" y2="-4" stroke="#7a9555" stroke-width="2"/>
          <ellipse cx="-40" cy="-5" rx="3" ry="1.5" fill="#8aa063" transform="rotate(-15 -40 -5)"/>
        </g>
        <!-- Dove 2 -->
        <g transform="translate(680, 290)">
          <ellipse cx="0" cy="0" rx="20" ry="10" fill="#fff5dc"/>
          <path d="M -22 -5 Q -18 -15, -10 -10 Q -6 -16, 0 -8 Z" fill="#fff5dc"/>
          <path d="M 5 -8 Q 12 -16, 20 -10 Q 25 -15, 22 -3 Z" fill="#fff5dc"/>
          <circle cx="22" cy="-2" r="5" fill="#fff5dc"/>
          <circle cx="24" cy="-3" r="1" fill="#3a2818"/>
          <path d="M 28 -1 L 32 0 L 28 1" stroke="#e8b942" stroke-width="1.5" fill="none"/>
        </g>
        <!-- Dove 3 -->
        <g transform="translate(150, 400)" opacity="0.85">
          <ellipse cx="0" cy="0" rx="15" ry="7" fill="#fff5dc"/>
          <path d="M -15 -3 Q -12 -10, -7 -7 Z" fill="#fff5dc"/>
          <path d="M 4 -5 Q 8 -10, 14 -7 Z" fill="#fff5dc"/>
          <circle cx="-15" cy="-1" r="3.5" fill="#fff5dc"/>
        </g>
      </g>

      <!-- ========================================== -->
      <!-- CENTRAL VESSEL - the golden chalice         -->
      <!-- ========================================== -->
      <!-- Vessel base (lower part) -->
      <path d="M 360 660 L 380 770 Q 380 790, 400 800 L 500 800 Q 520 790, 520 770 L 540 660 Z"
            fill="url(#vesselGrad)" stroke="#6e5020" stroke-width="2"/>
      <!-- Vessel rim -->
      <ellipse cx="450" cy="660" rx="90" ry="14" fill="#f5d678" stroke="#6e5020" stroke-width="2"/>
      <ellipse cx="450" cy="658" rx="82" ry="10" fill="#8a6620" opacity="0.4"/>
      <!-- Shine on vessel -->
      <path d="M 390 690 Q 395 740, 405 780" stroke="url(#vesselShine)" stroke-width="6" fill="none"/>
      <!-- Decorative band on vessel -->
      <rect x="385" y="720" width="130" height="6" fill="#8a6620" opacity="0.6"/>
      <circle cx="420" cy="723" r="4" fill="#fff7d4" opacity="0.8"/>
      <circle cx="450" cy="723" r="4" fill="#fff7d4" opacity="0.8"/>
      <circle cx="480" cy="723" r="4" fill="#fff7d4" opacity="0.8"/>

      <!-- Pedestal/foot -->
      <path d="M 405 800 L 400 825 L 500 825 L 495 800 Z" fill="url(#vesselGrad)" stroke="#6e5020" stroke-width="2"/>
      <ellipse cx="450" cy="830" rx="65" ry="8" fill="#8a6620"/>

      <!-- ========================================== -->
      <!-- BLESSINGS INSIDE THE VESSEL                 -->
      <!-- ========================================== -->
      <!-- Fruits and coins overflowing -->
      <!-- Pomegranates -->
      <circle cx="410" cy="650" r="14" fill="#c8543e"/>
      <circle cx="408" cy="647" r="3" fill="#e87560" opacity="0.8"/>
      <path d="M 408 638 L 408 633 L 412 632 L 412 638" stroke="#5a3f24" stroke-width="2" fill="#5a3f24"/>

      <circle cx="490" cy="652" r="13" fill="#c8543e"/>
      <circle cx="488" cy="649" r="3" fill="#e87560" opacity="0.8"/>
      <path d="M 488 642 L 488 637 L 492 636 L 492 642" stroke="#5a3f24" stroke-width="2" fill="#5a3f24"/>

      <!-- Gold coins -->
      <ellipse cx="445" cy="648" rx="14" ry="6" fill="#e8b942" stroke="#8a6620" stroke-width="1.5"/>
      <text x="445" y="652" text-anchor="middle" font-family="Bellefair, serif" font-size="11" fill="#8a6620" font-weight="bold">✦</text>

      <ellipse cx="420" cy="640" rx="11" ry="5" fill="#f5d678" stroke="#8a6620" stroke-width="1.5"/>
      <ellipse cx="475" cy="642" rx="11" ry="5" fill="#f5d678" stroke="#8a6620" stroke-width="1.5"/>

      <!-- Golden grain stems coming out -->
      <g stroke="#d9a943" stroke-width="2" fill="none" stroke-linecap="round">
        <path d="M 395 645 Q 388 620, 385 595"/>
        <path d="M 510 645 Q 517 620, 520 595"/>
        <!-- Grain heads -->
        <ellipse cx="385" cy="590" rx="3" ry="6" fill="#e8b942" stroke="#d9a943"/>
        <ellipse cx="520" cy="590" rx="3" ry="6" fill="#e8b942" stroke="#d9a943"/>
      </g>

      <!-- Olive branch crossing vessel -->
      <path d="M 360 680 Q 340 660, 320 665" stroke="#7a9555" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="350" cy="670" rx="5" ry="2.5" fill="#8aa063" transform="rotate(-25 350 670)"/>
      <ellipse cx="335" cy="665" rx="5" ry="2.5" fill="#8aa063" transform="rotate(-15 335 665)"/>
      <ellipse cx="325" cy="664" rx="5" ry="2.5" fill="#8aa063" transform="rotate(-5 325 664)"/>

      <path d="M 540 680 Q 560 660, 580 665" stroke="#7a9555" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="550" cy="670" rx="5" ry="2.5" fill="#8aa063" transform="rotate(25 550 670)"/>
      <ellipse cx="565" cy="665" rx="5" ry="2.5" fill="#8aa063" transform="rotate(15 565 665)"/>
      <ellipse cx="575" cy="664" rx="5" ry="2.5" fill="#8aa063" transform="rotate(5 575 664)"/>

      <!-- ========================================== -->
      <!-- LARGE HEART ABOVE VESSEL - love/peace      -->
      <!-- ========================================== -->
      <g transform="translate(450, 470)">
        <!-- Glow behind heart -->
        <circle cx="0" cy="20" r="80" fill="#f5b5a0" opacity="0.25"/>
        <!-- Heart shape -->
        <path d="M 0 50 C -55 -10, -55 -30, -30 -30 C -10 -30, 0 -10, 0 -10 C 0 -10, 10 -30, 30 -30 C 55 -30, 55 -10, 0 50 Z"
              fill="url(#heartGrad)" stroke="#8a3120" stroke-width="1.5"/>
        <!-- Heart highlight -->
        <ellipse cx="-15" cy="-15" rx="8" ry="6" fill="#f8c8b8" opacity="0.7"/>
        <!-- Small hearts orbiting -->
        <g opacity="0.7">
          <path d="M -70 -5 C -73 -10, -76 -10, -76 -6 C -76 -2, -70 5, -70 5 C -70 5, -64 -2, -64 -6 C -64 -10, -67 -10, -70 -5 Z" fill="#e87560"/>
        </g>
        <g opacity="0.7">
          <path d="M 70 -5 C 67 -10, 64 -10, 64 -6 C 64 -2, 70 5, 70 5 C 70 5, 76 -2, 76 -6 C 76 -10, 73 -10, 70 -5 Z" fill="#e87560"/>
        </g>
      </g>

      <!-- ========================================== -->
      <!-- BROKEN VESSEL (faded, on the side)         -->
      <!-- ========================================== -->
      <g transform="translate(750, 720)" opacity="0.5">
        <!-- Broken vessel pieces -->
        <path d="M 0 0 L 8 50 L 38 50 L 28 5 Z" fill="url(#brokenGrad)" stroke="#5a5246" stroke-width="1"/>
        <path d="M 45 -5 L 55 45 L 75 45 L 80 0 Z" fill="url(#brokenGrad)" stroke="#5a5246" stroke-width="1"/>
        <!-- Cracks -->
        <path d="M 38 50 L 45 -5" stroke="#3a3528" stroke-width="2" fill="none"/>
        <!-- Coins spilling out (lost) -->
        <ellipse cx="20" cy="65" rx="6" ry="2.5" fill="#999180" stroke="#5a5246" stroke-width="1"/>
        <ellipse cx="45" cy="68" rx="5" ry="2" fill="#999180" stroke="#5a5246" stroke-width="1"/>
        <ellipse cx="65" cy="63" rx="5" ry="2" fill="#999180" stroke="#5a5246" stroke-width="1"/>
        <!-- Red anger sparks above the broken vessel -->
        <g fill="#c8231a" opacity="0.7">
          <path d="M 25 -25 L 28 -15 L 32 -22 L 33 -10 L 38 -18 L 36 -8 L 41 -15" stroke="#c8231a" stroke-width="2" fill="none" stroke-linecap="round"/>
          <circle cx="20" cy="-30" r="3" opacity="0.6"/>
          <circle cx="50" cy="-28" r="2.5" opacity="0.5"/>
          <circle cx="35" cy="-35" r="2" opacity="0.4"/>
        </g>
        <!-- X mark above -->
        <g stroke="#c8231a" stroke-width="3" stroke-linecap="round" opacity="0.6">
          <line x1="55" y1="-45" x2="75" y2="-25"/>
          <line x1="75" y1="-45" x2="55" y2="-25"/>
        </g>
      </g>

      <!-- ========================================== -->
      <!-- PEOPLE - business owner with employees     -->
      <!-- ========================================== -->
      <!-- Person 1 - Business owner (center-left, gesturing welcome) -->
      <g transform="translate(220, 880)">
        <!-- Body in suit -->
        <ellipse cx="0" cy="60" rx="35" ry="55" fill="#4a6878"/>
        <!-- Suit lapels -->
        <path d="M -15 5 L -5 50 L 5 50 L 15 5" fill="#3a5060"/>
        <!-- Tie -->
        <path d="M -3 10 L -3 45 L 0 50 L 3 45 L 3 10" fill="#8c2a1e"/>
        <!-- Collar -->
        <path d="M -18 0 L -3 10 L 3 10 L 18 0" stroke="#fff5dc" stroke-width="2" fill="none"/>
        <!-- Neck -->
        <rect x="-12" y="-22" width="24" height="22" fill="#d9b58a"/>
        <!-- Head -->
        <circle cx="0" cy="-50" r="34" fill="#d9b58a"/>
        <!-- Hair -->
        <path d="M -28 -68 Q 0 -85, 28 -68 Q 28 -78, 0 -82 Q -28 -78, -28 -68 Z" fill="#3a2818"/>
        <!-- Smiling eyes (curved) -->
        <path d="M -14 -50 Q -10 -45, -6 -50" stroke="#3a2818" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M 6 -50 Q 10 -45, 14 -50" stroke="#3a2818" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Big smile -->
        <path d="M -10 -32 Q 0 -22, 10 -32" stroke="#3a2818" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Rosy cheeks -->
        <circle cx="-20" cy="-38" r="5" fill="#e89a8a" opacity="0.55"/>
        <circle cx="20" cy="-38" r="5" fill="#e89a8a" opacity="0.55"/>
        <!-- Arm extending welcome (right arm raised) -->
        <path d="M 30 20 Q 60 -5, 80 -25" stroke="#4a6878" stroke-width="13" fill="none" stroke-linecap="round"/>
        <!-- Open hand -->
        <ellipse cx="85" cy="-30" rx="12" ry="9" fill="#d9b58a"/>
        <!-- Other arm -->
        <path d="M -30 20 Q -50 35, -45 60" stroke="#4a6878" stroke-width="13" fill="none" stroke-linecap="round"/>
        <ellipse cx="-46" cy="65" rx="9" ry="7" fill="#d9b58a"/>
      </g>

      <!-- Person 2 - Employee (right of owner, also smiling) -->
      <g transform="translate(670, 890)">
        <!-- Body -->
        <ellipse cx="0" cy="55" rx="32" ry="50" fill="#8a6e44"/>
        <!-- Collar/shirt -->
        <path d="M -18 -5 L -3 5 L 3 5 L 18 -5" stroke="#fff5dc" stroke-width="2" fill="none"/>
        <!-- Neck -->
        <rect x="-11" y="-25" width="22" height="22" fill="#d9b58a"/>
        <!-- Head -->
        <circle cx="0" cy="-50" r="30" fill="#d9b58a"/>
        <!-- Hair with kippah hint -->
        <path d="M -25 -65 Q 0 -78, 25 -65 Q 25 -73, 0 -77 Q -25 -73, -25 -65 Z" fill="#5a3f24"/>
        <!-- Small kippah -->
        <ellipse cx="0" cy="-78" rx="14" ry="5" fill="#3a2818"/>
        <!-- Smiling eyes -->
        <path d="M -13 -50 Q -9 -46, -5 -50" stroke="#3a2818" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M 5 -50 Q 9 -46, 13 -50" stroke="#3a2818" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Smile -->
        <path d="M -9 -33 Q 0 -25, 9 -33" stroke="#3a2818" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Cheeks -->
        <circle cx="-18" cy="-38" r="4.5" fill="#e89a8a" opacity="0.55"/>
        <circle cx="18" cy="-38" r="4.5" fill="#e89a8a" opacity="0.55"/>
        <!-- Arms holding gift/heart -->
        <path d="M -25 10 Q -40 -5, -50 -25" stroke="#8a6e44" stroke-width="11" fill="none" stroke-linecap="round"/>
        <ellipse cx="-53" cy="-30" rx="9" ry="7" fill="#d9b58a"/>
        <path d="M 25 10 Q 35 -5, 25 -30" stroke="#8a6e44" stroke-width="11" fill="none" stroke-linecap="round"/>
        <ellipse cx="22" cy="-35" rx="9" ry="7" fill="#d9b58a"/>
        <!-- Heart held between hands -->
        <g transform="translate(-15, -45)">
          <path d="M 0 10 C -15 -5, -15 -15, -7 -15 C -3 -15, 0 -10, 0 -10 C 0 -10, 3 -15, 7 -15 C 15 -15, 15 -5, 0 10 Z"
                fill="#e87560" stroke="#b8472e" stroke-width="1"/>
        </g>
      </g>

      <!-- Person 3 - Customer (smaller, in background, smiling, walking in) -->
      <g transform="translate(420, 920)" opacity="0.85">
        <ellipse cx="0" cy="45" rx="25" ry="40" fill="#a87a4e"/>
        <rect x="-9" y="-15" width="18" height="18" fill="#d9b58a"/>
        <circle cx="0" cy="-35" r="24" fill="#d9b58a"/>
        <path d="M -20 -50 Q 0 -60, 20 -50 Q 20 -56, 0 -60 Q -20 -56, -20 -50 Z" fill="#3a2818"/>
        <path d="M -10 -36 Q -7 -33, -4 -36" stroke="#3a2818" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 4 -36 Q 7 -33, 10 -36" stroke="#3a2818" stroke-width="2" fill="none" stroke-linecap="round"/>
